<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Keyframe</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="../imagens/logo keyframe transparente.png" alt="Logo">
        </div>

        <div class="titulo">
            <h1>Studio Keyframe</h1>
            <p>Universidade de Design de Animação</p>
        </div>

        <nav>
            <ul>
                <li><a href="./home.HTML">Home</a></li>
                <li><a href="./contato.HTML">Contato</a></li>
                <li><a href="./sobre.HTML">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contato: Envie-nos sua dúvida!</h2>
            <form>
                <fieldset>
                    <legend>Formulário</legend>
                    <label for="name">Nome:</label>
                    <input type="text" id="name" name="name" placeholder="digite seu nome aqui"><br>

                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="digite seu e-mail aqui"><br>

                    <label for="comments">Mensagem:</label><br>
                    <textarea name="comentarios" id="comentarios" rows="4" cols="60" placeholder="digite seus comentários aqui"></textarea><br>
                    <button>Enviar</button>
                    </fieldset>
            </form>
         </section>
    </main>

    <footer>
        <p>&copy; Studio Keyframe. Todos os direitos reservados</p>
    </footer>

</body>
</html>
