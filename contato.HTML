<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Keyframe</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

    <header class="d-flex align-items-center p-4 bg-black">

        <!-- Logo -->
        <div class="w-25">
            <img src="./imagens/logo keyframe transparente.png" alt="Logo" class="img-fluid" style="width: 200px;">
        </div>

        <!-- Título -->
        <div class="text-center w-50">
            <h1 class="fw-bold titulo-principal">Studio Keyframe</h1>
            <p class="subtitulo">Universidade de Design de Animação</p>
        </div>

        <!-- Menu -->
        <nav class="w-25">
            <ul class="list-unstyled d-flex flex-column align-items-end gap-1 m-0">
                <li><a href="./index.html" class="text-decoration-none link-custom">Home</a></li>
                <li><a href="./sobre.html" class="text-decoration-none link-custom">Sobre</a></li>
                <li><a href="./contato.html" class="text-decoration-none link-custom">Contato</a></li>
            </ul>
        </nav>

    </header>

    <main class="container py-5">

        <section class="d-flex flex-column gap-3">

            <h2 class="titulo-principal">Contato: Envie-nos sua dúvida!</h2>

            <form>

                <fieldset class="p-3 rounded border">
                    <legend class="px-2 subtitulo">Contato</legend>

                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Nome">
                    </div>

                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <textarea class="form-control" rows="4" placeholder="Mensagem"></textarea>
                    </div>

                    <button class="btn w-100 botao-custom">
                        Enviar
                    </button>

                </fieldset>

            </form>

        </section>

    </main>

    <footer class="bg-black text-center p-4">
        <p class="mb-0">&copy; Studio Keyframe. Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
